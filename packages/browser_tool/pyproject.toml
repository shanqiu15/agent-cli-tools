[project]
name = "browser-tool"
version = "0.1.0"
description = "Browser automation CLI tool wrapping @playwright/cli via subprocess"
requires-python = ">=3.12"
dependencies = [
    "cli-common",
    "pydantic>=2.0",
    "typer>=0.9",
]

[project.scripts]
browser-tool = "browser_tool.cli:app"

[tool.uv.sources]
cli-common = { workspace = true }


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.mypy]
mypy_path = "src"

[[tool.mypy.overrides]]
module = "cli_common.*"
ignore_missing_imports = true

[tool.hatch.build.targets.wheel]
packages = ["src/browser_tool"]
