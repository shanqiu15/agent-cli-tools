[project]
name = "vision-tool"
version = "0.1.0"
description = "Vision analysis CLI tool for LLM agents"
requires-python = ">=3.12"
dependencies = [
    "cli-common",
    "pydantic>=2.0",
    "typer>=0.9",
    "httpx>=0.27",
]

[project.scripts]
vision-tool = "vision_tool.cli:app"

[tool.uv.sources]
cli-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.mypy]
mypy_path = "src"

[[tool.mypy.overrides]]
module = "cli_common.*"
ignore_missing_imports = true

[tool.hatch.build.targets.wheel]
packages = ["src/vision_tool"]
