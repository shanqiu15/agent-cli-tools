[project]
name = "image-gen-tool"
version = "0.1.0"
description = "Image generation CLI tool using the Google Gemini API"
requires-python = ">=3.12"
dependencies = [
    "cli-common",
    "google-genai>=1.0",
    "pydantic>=2.0",
    "typer>=0.9",
]

[project.scripts]
image-gen-tool = "image_gen_tool.cli:app"

[tool.uv.sources]
cli-common = { workspace = true }


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.mypy]
mypy_path = "src"

[[tool.mypy.overrides]]
module = "cli_common.*"
ignore_missing_imports = true

[tool.hatch.build.targets.wheel]
packages = ["src/image_gen_tool"]
