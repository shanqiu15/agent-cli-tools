[project]
name = "cron-tool"
version = "0.1.0"
description = "CLI tool for scheduling jobs via an HTTP gateway API"
requires-python = ">=3.12"
dependencies = [
    "cli-common",
    "httpx>=0.27",
    "pydantic>=2.0",
    "typer>=0.9",
]

[project.scripts]
cron-tool = "cron_tool.cli:app"

[tool.uv.sources]
cli-common = { workspace = true }


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.mypy]
mypy_path = "src"

[[tool.mypy.overrides]]
module = "cli_common.*"
ignore_missing_imports = true

[tool.hatch.build.targets.wheel]
packages = ["src/cron_tool"]
